services:
  ai-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-orchestrator:latest
    container_name: ai-orchestrator
    restart: unless-stopped
    environment:
      - OLLAMA_HOST=http://ollama:11434
      - RUNPOD_API_KEY=${RUNPOD_API_KEY:?ERROR RUNPOD_API_KEY must be set in .env}
      - INFISICAL_CLIENT_ID=${INFISICAL_CLIENT_ID}
      - INFISICAL_CLIENT_SECRET=${INFISICAL_CLIENT_SECRET}
      - INFISICAL_PROJECT_SLUG=ai-orchestrator
    depends_on:
      ollama:
        condition: service_started
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.ai-orchestrator.rule=Host(`ai.jeffemmett.com`)"
      - "traefik.http.routers.ai-orchestrator.entrypoints=web"
      - "traefik.http.services.ai-orchestrator.loadbalancer.server.port=8080"
      - "traefik.http.routers.ai-orchestrator-secure.rule=Host(`ai.jeffemmett.com`)"
      - "traefik.http.routers.ai-orchestrator-secure.entrypoints=websecure"
      - "traefik.http.routers.ai-orchestrator-secure.tls=true"
      - "traefik.http.services.ai-orchestrator.loadbalancer.healthcheck.path=/api/health"
      - "traefik.http.services.ai-orchestrator.loadbalancer.healthcheck.interval=30s"
    networks:
      - traefik-public
      - ai-internal
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s

  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - ai-internal
    expose:
      - "11434"
    healthcheck:
      test: ["CMD-SHELL", "ollama list || exit 0"]
      interval: 60s
      timeout: 30s
      retries: 3
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 16G
        reservations:
          memory: 4G

volumes:
  ollama-data:
    driver: local

networks:
  traefik-public:
    external: true
  ai-internal:
    external: true
