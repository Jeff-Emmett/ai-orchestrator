services:
  ai-orchestrator:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-orchestrator:latest
    container_name: ai-orchestrator
    restart: unless-stopped
    environment:
    - OLLAMA_HOST=http://ollama:11434
    - RUNPOD_API_KEY=${RUNPOD_API_KEY:?ERROR RUNPOD_API_KEY must be set in .env}
    labels:
    - traefik.enable=true
    - traefik.http.routers.ai-orchestrator.rule=Host(`ai.jeffemmett.com`)
    - traefik.http.routers.ai-orchestrator.entrypoints=web
    - traefik.http.services.ai-orchestrator.loadbalancer.server.port=8080
    - traefik.http.routers.ai-orchestrator-secure.rule=Host(`ai.jeffemmett.com`)
    - traefik.http.routers.ai-orchestrator-secure.entrypoints=websecure
    - traefik.http.routers.ai-orchestrator-secure.tls=true
    - traefik.http.services.ai-orchestrator.loadbalancer.healthcheck.path=/api/health
    - traefik.http.services.ai-orchestrator.loadbalancer.healthcheck.interval=30s
    networks:
    - traefik-public
    - ai-internal
    healthcheck:
      test:
      - CMD
      - python
      - -c
      - import urllib.request; urllib.request.urlopen('http://localhost:8080/api/health')
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    volumes:
    - /opt/infisical/entrypoint-wrapper.sh:/infisical-entrypoint.sh:ro
    entrypoint:
    - /infisical-entrypoint.sh
    command:
    - python
    - -m
    - uvicorn
    - server:app
    - --host
    - 0.0.0.0
    - --port
    - "8080"
    env_file:
    - .env

networks:
  traefik-public:
    external: true
  ai-internal:
    external: true
